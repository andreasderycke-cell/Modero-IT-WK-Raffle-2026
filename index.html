<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WK Raffle 2026 — Live Klassement</title>

<!-- ============================================================
     FONTS  (vervang gerust door je eigen voorkeur)
     ============================================================ -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<style>
/* ================================================================
   ┌──────────────────────────────────────────────────────────┐
   │  1. HIER PAS JE DE VORMGEVING AAN                          │
   │  Verander kleuren, naam en accenten. Alles werkt via deze  │
   │  variabelen — je hoeft niets anders aan te raken.          │
   └──────────────────────────────────────────────────────────┘
   ================================================================ */
:root{
  --bg:            #0a1f1c;   /* hoofdachtergrond (diep voetbalgroen) */
  --bg-2:          #0d2b25;   /* tweede laag */
  --pitch:         #114b3a;   /* veld-accent */
  --gold:          #f4c542;   /* goud / 1e plaats */
  --silver:        #cfd6dd;   /* zilver / 2e plaats */
  --bronze:        #d98a4b;   /* brons / 3e plaats */
  --fourth:        #6fb1ff;   /* 4e plaats accent */
  --accent:        #f4c542;   /* algemeen accent (koppen, lijnen) */
  --text:          #f3f7f5;   /* hoofdtekst */
  --text-dim:      #8fa9a1;   /* gedempte tekst */
  --card:          #102f28;   /* tabel-achtergrond */
  --line:          #1d4a3f;   /* lijnen / randen */

  /* Pot-kleuren (zelfde logica als in Excel) */
  --pot1:#3f9d57; --pot2:#3f7dbf; --pot3:#c9a227; --pot4:#cf6b2f;

  --title:    "WK RAFFLE 2026";
  --subtitle: "Modero IT — Live Klassement Puntencompetitie";
}

/* ================================================================
   2. BASIS (normaal niet nodig om aan te passen)
   ================================================================ */
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:'Archivo',system-ui,sans-serif;
  background:
    radial-gradient(1200px 600px at 80% -10%, rgba(244,197,66,.10), transparent 60%),
    radial-gradient(900px 500px at -10% 110%, rgba(63,157,87,.18), transparent 55%),
    linear-gradient(160deg, var(--bg) 0%, var(--bg-2) 100%);
  color:var(--text);
  min-height:100vh;
  padding:clamp(16px,4vw,48px);
  position:relative;
  overflow-x:hidden;
}
/* subtiele veldlijnen op de achtergrond */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.05;
  background-image:
    linear-gradient(transparent 49.5%, var(--text) 49.5%, var(--text) 50.5%, transparent 50.5%);
  background-size:100% 90px;
}
.wrap{position:relative;z-index:1;max-width:920px;margin:0 auto}

/* ----- HEADER ----- */
header{text-align:center;margin-bottom:clamp(24px,5vw,48px)}
.badge{
  display:inline-flex;align-items:center;gap:8px;
  font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;font-weight:700;
  color:var(--bg);background:var(--gold);
  padding:6px 16px;border-radius:100px;margin-bottom:20px;
}
.badge::before{content:"";width:8px;height:8px;border-radius:50%;
  background:var(--bg);animation:pulse 1.6s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
h1{
  font-family:'Bebas Neue',sans-serif;
  font-size:clamp(3rem,11vw,6.5rem);line-height:.9;letter-spacing:.02em;
  background:linear-gradient(180deg,#fff 0%,var(--gold) 120%);
  -webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 4px 30px rgba(244,197,66,.25);
}
.subtitle{color:var(--text-dim);font-size:clamp(.85rem,2.4vw,1.05rem);
  font-weight:500;margin-top:8px;letter-spacing:.04em}
.updated{color:var(--text-dim);font-size:.78rem;margin-top:14px;opacity:.8}

/* ----- PODIUM (top 3) ----- */
.podium{
  display:grid;grid-template-columns:1fr 1.15fr 1fr;gap:12px;
  align-items:end;margin:0 auto clamp(28px,5vw,44px);max-width:680px;
}
.pod{
  background:linear-gradient(180deg,var(--card),rgba(16,47,40,.5));
  border:1px solid var(--line);border-radius:16px;
  padding:18px 12px;text-align:center;position:relative;
  animation:rise .7s cubic-bezier(.2,.8,.2,1) backwards;
}
.pod .rank-num{font-family:'Bebas Neue';font-size:2.4rem;line-height:1}
.pod .who{font-weight:800;font-size:1.02rem;margin-top:6px;word-break:break-word}
.pod .land{color:var(--text-dim);font-size:.82rem;margin-top:2px}
.pod .pts{font-family:'Bebas Neue';font-size:2rem;margin-top:10px}
.pod .prize{font-size:.72rem;font-weight:700;letter-spacing:.04em;
  margin-top:6px;text-transform:uppercase;opacity:.9}
.pod.p1{transform:translateY(-14px);border-color:var(--gold);
  box-shadow:0 16px 50px -20px var(--gold);animation-delay:.15s}
.pod.p1 .rank-num,.pod.p1 .pts{color:var(--gold)}
.pod.p2{animation-delay:.05s}
.pod.p2 .rank-num,.pod.p2 .pts{color:var(--silver)}
.pod.p3{animation-delay:.25s}
.pod.p3 .rank-num,.pod.p3 .pts{color:var(--bronze)}
.medal{font-size:1.4rem;position:absolute;top:-14px;left:50%;transform:translateX(-50%)}
@keyframes rise{from{opacity:0;transform:translateY(24px)}}
.pod.p1{animation-name:rise1}
@keyframes rise1{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(-14px)}}

/* ----- TABEL ----- */
.board{
  background:linear-gradient(180deg,var(--card),rgba(13,43,37,.6));
  border:1px solid var(--line);border-radius:18px;overflow:hidden;
  box-shadow:0 30px 60px -30px rgba(0,0,0,.6);
}
.board-head{
  display:grid;grid-template-columns:54px 1fr 1fr 50px 86px;
  gap:8px;padding:14px 18px;
  font-size:.7rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--text-dim);font-weight:700;border-bottom:1px solid var(--line);
  background:rgba(255,255,255,.02);
}
.board-head .r{text-align:center}
.row{
  display:grid;grid-template-columns:54px 1fr 1fr 50px 86px;gap:8px;
  padding:14px 18px;align-items:center;
  border-bottom:1px solid rgba(29,74,63,.5);
  animation:fade .5s ease backwards;transition:background .2s;
}
.row:hover{background:rgba(244,197,66,.05)}
.row:last-child{border-bottom:none}
@keyframes fade{from{opacity:0;transform:translateX(-8px)}}
.pos{font-family:'Bebas Neue';font-size:1.5rem;text-align:center;color:var(--text-dim)}
.row.top1 .pos{color:var(--gold)} .row.top2 .pos{color:var(--silver)}
.row.top3 .pos{color:var(--bronze)} .row.top4 .pos{color:var(--fourth)}
.name{font-weight:700;font-size:1rem}
.country{color:var(--text-dim);font-size:.92rem}
.pot{justify-self:center;width:28px;height:28px;border-radius:8px;
  display:grid;place-items:center;font-weight:800;font-size:.82rem;color:#fff}
.pot.pot1{background:var(--pot1)} .pot.pot2{background:var(--pot2)}
.pot.pot3{background:var(--pot3)} .pot.pot4{background:var(--pot4)}
.score{font-family:'Bebas Neue';font-size:1.7rem;text-align:right;color:var(--accent)}
.row.top1{background:linear-gradient(90deg,rgba(244,197,66,.10),transparent)}
.prize-tag{display:inline-block;font-size:.64rem;font-weight:800;
  padding:2px 7px;border-radius:5px;margin-left:8px;vertical-align:middle;
  letter-spacing:.04em}
.prize-tag.t1{background:var(--gold);color:#3a2c00}
.prize-tag.t2{background:var(--silver);color:#22282e}
.prize-tag.t3{background:var(--bronze);color:#2a1500}
.prize-tag.t4{background:var(--fourth);color:#06203f}

/* ----- FOOTER / paneel ----- */
footer{text-align:center;margin-top:36px;color:var(--text-dim);font-size:.8rem;line-height:1.7}
footer .pot-key{display:inline-flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:10px}
footer .pot-key span{display:inline-flex;align-items:center;gap:6px}
footer .dot{width:12px;height:12px;border-radius:4px;display:inline-block}
footer .powered{margin-top:22px;padding-top:16px;border-top:1px solid var(--line);
  font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--text-dim);opacity:.85}
footer .powered .brand{font-family:'Bebas Neue',sans-serif;font-size:1.05rem;letter-spacing:.14em;
  color:var(--gold);margin-left:4px}
.empty{padding:60px 20px;text-align:center;color:var(--text-dim)}

@media(max-width:560px){
  .podium{grid-template-columns:1fr;max-width:320px}
  .pod.p1{transform:none;animation-name:rise}
  .board-head,.row{grid-template-columns:40px 1fr 40px 70px}
  .board-head .h-country,.country{display:none}
}

/* ----- VLAG-AFBEELDINGEN (flagcdn.com) ----- */
.flag{width:26px;height:auto;border-radius:3px;vertical-align:middle;margin-right:8px;
  box-shadow:0 1px 4px rgba(0,0,0,.4);object-fit:cover}
.country{display:flex;align-items:center}
.pod .land{display:flex;align-items:center;justify-content:center}
.pod .land .flag{width:22px;margin-right:6px}
@media(max-width:560px){ .country .flag{display:none} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <span class="badge" id="liveBadge">Live</span>
    <h1 id="title">WK RAFFLE 2026</h1>
    <p class="subtitle" id="subtitle">Modero IT — Live Klassement Puntencompetitie</p>
    <p class="updated" id="updated"></p>
  </header>

  <div class="podium" id="podium"></div>

  <div class="board">
    <div class="board-head">
      <div class="r">#</div>
      <div>Deelnemer</div>
      <div class="h-country">Land</div>
      <div class="r">Pot</div>
      <div style="text-align:right">Punten</div>
    </div>
    <div id="rows"><div class="empty">Nog geen data ingevuld.</div></div>
  </div>

  <footer>
    <div>Prijzen: 🥇 35% · 🥈 25% · 🥉 15% · 🏅 10% van de puntenpot</div>
    <div class="pot-key">
      <span><i class="dot" style="background:var(--pot1)"></i>Pot 1 ×1,0</span>
      <span><i class="dot" style="background:var(--pot2)"></i>Pot 2 ×1,5</span>
      <span><i class="dot" style="background:var(--pot3)"></i>Pot 3 ×2,0</span>
      <span><i class="dot" style="background:var(--pot4)"></i>Pot 4 ×2,5</span>
    </div>
    <div class="powered">Powered by <span class="brand">DAIVE</span></div>
  </footer>
</div>

<script>
/* ================================================================
   ┌──────────────────────────────────────────────────────────┐
   │  3. HIER PLAK JE DE STAND  (uit Excel-tab 'Klassement       │
   │     (live)').  Volgorde van kolommen:                       │
   │     Plaats ; Deelnemer ; Land ; Pot ; Eindscore ; Status    │
   │                                                            │
   │  Hoe kopiëren uit Excel:                                    │
   │   1. Selecteer in 'Klassement (live)' de rijen met data    │
   │      (kolommen Plaats t/m Status), zonder de kop.          │
   │   2. Kopieer (Ctrl/Cmd+C).                                  │
   │   3. Plak hieronder tussen de ` ` (backticks).             │
   │      Excel plakt met TABs — dat werkt automatisch.         │
   │      CSV met puntkomma's of komma's werkt ook.            │
   └──────────────────────────────────────────────────────────┘
   ================================================================ */

const DATA = `
1	Alper	Algeria	3	0	1e - 35%
2	Andreas	Egypt	3	0	1e - 35%
3	Anaïs	Senegal	2	0	1e - 35%

45	Raf	Curacao	4	0	1e - 35%

60	Yannick	Norway	3	0	1e - 35%
61	Yasmine	Panama	3	0	1e - 35%
`;

/* Datum die getoond wordt als "laatst bijgewerkt". Pas aan of laat leeg. */
const LAST_UPDATED = "Groepsfase — speeldag 1";   // bv. "Speeldag 2 — 18 juni"

/* ----------------------------------------------------------------
   4. VERWERKING (niet nodig om aan te passen)
   ---------------------------------------------------------------- */
function parse(raw){
  return raw.trim().split(/\r?\n/).map(line=>{
    const cells = line.split(/\t|;|,(?=(?:[^"]*"[^"]*")*[^"]*$)/)
                      .map(c=>c.replace(/^"|"$/g,'').trim());
    return {
      pos:    cells[0]||'',
      name:   cells[1]||'',
      country:cells[2]||'',
      pot:    (cells[3]||'').replace(/[^0-9]/g,''),
      score:  cells[4]||'',
      status: cells[5]||''
    };
  }).filter(r=>r.name);
}

const FLAG_CODE = { /* ISO 3166 landcodes voor flagcdn.com (echte vlagafbeeldingen) */
  "Belgium":"be",
  "Argentina":"ar",
  "Uruguay":"uy",
  "England":"gb-eng",
  "Spain":"es",
  "Algeria":"dz",
  "Croatia":"hr",
  "Ghana":"gh",
  "Iran":"ir",
  "Egypt":"eg",
  "Jordan":"jo",
  "Brazil":"br",
  "United States":"us",
  "Mexico":"mx",
  "Portugal":"pt",
  "Canada":"ca",
  "Germany":"de",
  "Netherlands":"nl",
  "France":"fr",
  "Cape Verde":"cv",
  "Saudi Arabia":"sa",
  "Austria":"at",
  "Morocco":"ma",
  "Tunisia":"tn",
  "Senegal":"sn",
  "Curacao":"cw",
  "Ivory Coast":"ci",
  "Bosnia-Herzegovina":"ba",

  "Uzbekistan":"uz",
  "South Africa":"za",
  "Scotland":"gb-sct",
  "Australia":"au",

  "Ecuador":"ec",
  "Sweden":"se",

  "Iraq":"iq",
  "New Zealand":"nz",
  "Czechia":"cz",
  "South Korea":"kr",
  "Colombia":"co",
  "Congo DR":"cd",
  "Turkiye":"tr"
};

/* Bouw een <img> met de vlag van flagcdn.com. Toont overal hetzelfde (geen emoji). */
function flagImg(country){
  if(!country) return '';
  const key=country.trim();
  let code=FLAG_CODE[key];
  if(!code){
    const lower=key.toLowerCase();
    for(const k in FLAG_CODE){ if(k.toLowerCase()===lower){ code=FLAG_CODE[k]; break; } }
  }
  if(!code) return '';
  return '<img class="flag" src="https://flagcdn.com/w40/'+code+'.png" '+
         'srcset="https://flagcdn.com/w80/'+code+'.png 2x" alt="" loading="lazy" '+
         'onerror="this.style.display=&#39;none&#39;">';
}

function prizeTag(pos){
  const t={1:['t1','35%'],2:['t2','25%'],3:['t3','15%'],4:['t4','10%']}[pos];
  return t?`<span class="prize-tag ${t[0]}">${t[1]}</span>`:'';
}

function render(){
  const rows = parse(DATA);
  document.getElementById('updated').textContent =
     LAST_UPDATED ? "Laatst bijgewerkt: "+LAST_UPDATED : "";

  // Podium (top 3)
  const podium=document.getElementById('podium');
  const order=[1,0,2]; // 2e links, 1e midden, 3e rechts
  if(rows.length>=1){
    podium.innerHTML = order.map(i=>{
      const r=rows[i]; if(!r) return '<div></div>';
      const cls=['p2','p1','p3'][order.indexOf(i)];
      const medal=['🥈','🥇','🥉'][order.indexOf(i)];
      const flag=flagImg(r.country);
      return `<div class="pod ${cls}">
        <span class="medal">${medal}</span>
        <div class="rank-num">${i+1}</div>
        <div class="who">${esc(r.name)}</div>
        <div class="land">${flag}<span>${esc(r.country)}</span></div>
        <div class="pts">${esc(r.score)}</div>
        <div class="prize">${['25%','35%','15%'][order.indexOf(i)]}</div>
      </div>`;
    }).join('');
  }

  // Volledige tabel
  const box=document.getElementById('rows');
  if(!rows.length){box.innerHTML='<div class="empty">Nog geen data ingevuld.</div>';return;}
  box.innerHTML = rows.map((r,idx)=>{
    const pos=idx+1;
    const topCls = pos<=4 ? `top${pos}` : '';
    const flag=flagImg(r.country);
    return `<div class="row ${topCls}" style="animation-delay:${idx*0.04}s">
      <div class="pos">${pos}</div>
      <div class="name">${esc(r.name)}${prizeTag(pos)}</div>
      <div class="country">${flag}<span>${esc(r.country)}</span></div>
      <div class="pot pot${r.pot||''}">${r.pot||''}</div>
      <div class="score">${esc(r.score)}</div>
    </div>`;
  }).join('');
}
function esc(s){return String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}

document.getElementById('title').textContent =
  getComputedStyle(document.documentElement).getPropertyValue('--title').replace(/"/g,'').trim() || 'WK RAFFLE 2026';
document.getElementById('subtitle').textContent =
  getComputedStyle(document.documentElement).getPropertyValue('--subtitle').replace(/"/g,'').trim() || '';

render();
</script>
